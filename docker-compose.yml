services:
  taty-sub-agent:
    build: .
    ports:
      - "9002:9002"
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "9002"
      DEFAULT_MODEL: ${DEFAULT_MODEL:-claude-sonnet-4-6}
      OPENAI_DEFAULT_MODEL: ${OPENAI_DEFAULT_MODEL:-gpt-4o}
      MAX_PARALLEL_AGENTS: ${MAX_PARALLEL_AGENTS:-5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./skills:/app/skills        # hot-reload skills without rebuild
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9002/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
